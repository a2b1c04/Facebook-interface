<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="Author" content="NJaey">
    <title>Facebook.com</title>
    <link rel="stylesheet" href="facebook.css">
</head>

<body>
    <main>
        <header>
            <img src="facebook.png" alt="facebook icon" width="50">
        </header>
        <hr class="hr">

        <container class="form-page">
            <form action="/action_page" method="">


                <h1>
                    Log in to Facebook
                </h1>

                <input type="text" placeholder="Email address or mobile number">
                <input type="password" placeholder="password">

                <button type="login">Log in</button>

                <button class="forgotten">
                    <a
                        href="https://web.facebook.com/recover/initiate/?privacy_mutation_token=eyJ0eXBlIjo1LCJjcmVhdGlvbl90aW1lIjoxNzc2Njg2MjYzfQ%3D%3D&ars=facebook_login">Forgotten
                        password?</a>
                </button>
                <button class="new">
                    <a class="new" href="https://web.facebook.com/reg/?entry_point=login&next=">Create new account </a>
                </button>
            </form>
            
                    <img class="meta" src="meta-logo-png.png" alt="meta logo" width="60" height="12">
        </container>
    </main>
</body>

</html>
